<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UltraPod</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

  <!-- PWA / iOS home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UltraPod">
  <meta name="theme-color" content="#c4c8ce">
  <link rel="manifest" href="manifest.json?v=13">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=13">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=13">

  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
<div id="scaler">
  <div id="app">

    <!-- ============ DISPLAY (fills the top, scaled to fit) ============ -->
    <div id="screen-region">
      <div class="screen" id="screen">

        <!-- ===== MENU VIEW (sidebar + mini cover flow) ===== -->
        <div class="view active" id="view-menu">
          <div class="menu-cf">
            <div class="art menu-cf-side menu-cf-left"  id="menu-cf-left"></div>
            <div class="art menu-cf-side menu-cf-right" id="menu-cf-right"></div>
            <div class="menu-cf-center">
              <div class="art menu-cf-center-art" id="menu-cf-center"></div>
            </div>
          </div>
          <div class="menu-cf-label">
            <div class="menu-cf-title" id="menu-cf-title">UltraPod</div>
            <div class="menu-cf-sub" id="menu-cf-sub">Spotify</div>
          </div>

          <div class="menu-sidebar" id="menu-sidebar">
            <div class="menu-item" data-idx="0">
              <span class="mi-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M10 8.5l6 3.5-6 3.5z" fill="currentColor" stroke="none"></path></svg></span>
              <span class="mi-label">Now Playing</span>
              <span class="mi-chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg></span>
            </div>
            <div class="menu-item" data-idx="1">
              <span class="mi-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="12" height="13" rx="2"></rect><path d="M8 7V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2"></path></svg></span>
              <span class="mi-label">Album Carousel</span>
              <span class="mi-chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg></span>
            </div>
            <div class="menu-item" data-idx="2">
              <span class="mi-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V6l10-2v12"></path><circle cx="6.5" cy="18" r="2.5"></circle><circle cx="16.5" cy="16" r="2.5"></circle></svg></span>
              <span class="mi-label">All Music</span>
              <span class="mi-chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg></span>
            </div>
            <div class="menu-item active" data-idx="3">
              <span class="mi-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="14" y2="17"></line></svg></span>
              <span class="mi-label">Playlists</span>
              <span class="mi-chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg></span>
            </div>
            <div class="menu-item" data-idx="4">
              <span class="mi-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6"></circle><line x1="20" y1="20" x2="15.6" y2="15.6"></line></svg></span>
              <span class="mi-label">Search</span>
              <span class="mi-chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg></span>
            </div>
            <div class="menu-item" data-idx="5">
              <span class="mi-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7"></path></svg></span>
              <span class="mi-label">Artists</span>
              <span class="mi-chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg></span>
            </div>
            <div class="menu-item" data-idx="6">
              <span class="mi-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"></circle><circle cx="12" cy="12" r="2"></circle></svg></span>
              <span class="mi-label">Albums</span>
              <span class="mi-chev"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg></span>
            </div>
          </div>
        </div>

        <!-- ===== NOW PLAYING ===== -->
        <div class="view" id="view-nowplaying">
          <div class="art np-art" id="np-art"></div>
          <div class="np-title"  id="np-title">Nothing playing</div>
          <div class="np-artist" id="np-artist">—</div>
          <div class="np-progress">
            <div class="np-bar">
              <div class="np-bar-fill" id="np-fill"></div>
              <div class="np-bar-knob" id="np-knob"></div>
            </div>
            <div class="np-times"><span id="np-cur">0:00</span><span id="np-dur">0:00</span></div>
          </div>
          <div class="np-controls">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#8e8e94" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"></path><path d="M21 3L4 20"></path><path d="M21 16v5h-5"></path><path d="M15 15l6 6"></path><path d="M4 4l4 4"></path></svg>
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1ed760" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"></path><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><path d="M7 22l-4-4 4-4"></path><path d="M21 13v1a4 4 0 0 1-4 4H3"></path></svg>
          </div>
        </div>

        <!-- ===== COVER FLOW (full, real 3D stack — rendered by ui.js) ===== -->
        <div class="view" id="view-coverflow">
          <div class="cf-stage" id="cf-stage"></div>
          <div class="cf-label">
            <div class="cf-title" id="cf-title">—</div>
            <div class="cf-sub"   id="cf-sub">—</div>
          </div>
        </div>

        <!-- ===== PLAYLISTS ===== -->
        <div class="view" id="view-playlists">
          <div class="list" id="list-playlists"></div>
        </div>

        <!-- ===== ARTISTS ===== -->
        <div class="view" id="view-artists">
          <div class="list artists" id="list-artists"></div>
        </div>

        <!-- ===== ALBUMS ===== -->
        <div class="view" id="view-albums">
          <div class="album-grid" id="grid-albums"></div>
        </div>

        <!-- ===== SEARCH ===== -->
        <div class="view" id="view-search">
          <div class="search-view">
            <div class="search-box" id="search-box">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8e8e94" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6"></circle><line x1="20" y1="20" x2="15.6" y2="15.6"></line></svg>
              <!-- inputmode=none: the in-app click-wheel keyboard supplies text, so
                   iOS must NOT raise the native keyboard. Desktop physical typing
                   still works (inputmode only governs the on-screen keyboard). -->
              <input class="search-input" id="search-input" type="text" inputmode="none" placeholder="Search music" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            </div>
            <div id="search-recent">
              <div class="search-recent-label">RECENT</div>
              <div class="search-recent" id="search-chips"></div>
            </div>
            <div class="search-results" id="search-results" style="display:none;"></div>
          </div>
        </div>

        <!-- ===== ALBUM DETAIL ===== -->
        <div class="view" id="view-albumdetail">
          <div class="art detail-art" id="detail-art"></div>
          <div class="detail-title" id="detail-title">—</div>
          <div class="detail-sub"   id="detail-sub">—</div>
          <div class="detail-tracks" id="detail-tracks"></div>
        </div>

        <!-- toast overlay -->
        <div class="toast" id="toast"></div>

      </div><!-- /.screen -->
    </div><!-- /#screen-region -->

    <!-- ============ CLICK WHEEL (fills the bottom, scaled to fit) ====== -->
    <div id="wheel-region">
      <div class="wheel" id="wheel">
        <div class="wheel-menu"   id="btn-menu">MENU</div>
        <div class="wheel-next"   id="btn-next">&#9654;&#9654;</div>
        <div class="wheel-prev"   id="btn-prev">&#9664;&#9664;</div>
        <div class="wheel-play"   id="btn-play">&#9655; &#9614;&#9614;</div>
        <div class="wheel-center" id="btn-center"></div>
      </div>
      <!-- in-app keyboard: morphs in over the wheel while typing a search
           (built + toggled by ui.js via the .kbd-open class). -->
      <div class="kbd" id="keyboard"></div>
    </div>

  </div><!-- /#app -->
</div><!-- /#scaler -->

  <!-- App modules (load order: config -> auth -> spotify -> player -> ui) -->
  <script src="config.js?v=13"></script>
  <script src="auth.js?v=13"></script>
  <script src="spotify.js?v=13"></script>
  <script src="player.js?v=13"></script>
  <script src="ui.js?v=13"></script>
  <!-- Spotify Web Playback SDK (loaded after player.js defines the ready callback) -->
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
</body>
</html>
